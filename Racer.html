<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Retro Racing Game</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #111;
    font-family: Arial, sans-serif;
  }

  canvas {
    display: block;
    margin: auto;
    background: linear-gradient(#70c5ff, #c2f0ff 45%, #3c9d3c 45%, #2f7a2f);
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 2px 2px 4px black;
  }

  #menu {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.7);
    color: white;
  }

  button {
    padding: 14px 30px;
    font-size: 22px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 20px;
  }

  h1 {
    font-size: 60px;
    margin: 0;
  }
</style>
</head>
<body>

<div id="ui">Speed: 0</div>

<div id="menu">
  <h1>RETRO RACER</h1>
  <p>Arrow Keys / WASD to drive</p>
  <button onclick="startGame()">Start Race</button>
</div>

<canvas id="game" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');
const menu = document.getElementById('menu');

let gameRunning = false;

const player = {
  x: 450,
  y: 500,
  width: 50,
  height: 90,
  speed: 0,
  maxSpeed: 12,
  accel: 0.2,
  friction: 0.08,
  turnSpeed: 6,
  color: 'red'
};

const keys = {};
const enemies = [];
const roadLines = [];

let score = 0;
let spawnTimer = 0;

for (let i = 0; i < 20; i++) {
  roadLines.push({
    x: canvas.width / 2 - 5,
    y: i * 40,
    width: 10,
    height: 25
  });
}

function startGame() {
  menu.style.display = 'none';
  gameRunning = true;
  score = 0;
  enemies.length = 0;
  player.x = 450;
  player.speed = 0;
  requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
});

window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

function spawnEnemy() {
  const lane = Math.floor(Math.random() * 3);
  const laneX = [300, 450, 600][lane];

  enemies.push({
    x: laneX,
    y: -120,
    width: 50,
    height: 90,
    speed: 6 + Math.random() * 5,
    color: `hsl(${Math.random()*360}, 80%, 50%)`
  });
}

function update() {
  player.maxSpeed = 12 + score * 0.08;
  player.turnSpeed = 6 + score * 0.005;
  player.accel = 0.2 + score * 0.0008;
  if (player.speed < player.maxSpeed) {
    player.speed += player.accel;
  }

  if ((keys['arrowdown'] || keys['s']) && player.speed > -4) {
    player.speed -= player.accel;
  }

  if (!(keys['arrowup'] || keys['w']) && !(keys['arrowdown'] || keys['s'])) {
    if (player.speed > 0) player.speed -= player.friction;
    if (player.speed < 0) player.speed += player.friction;
  }

  if (Math.abs(player.speed) < 0.05) player.speed = 0;

  if (keys['arrowleft'] || keys['a']) {
    player.x -= player.turnSpeed + player.speed * 0.25;
  }

  if (keys['arrowright'] || keys['d']) {
    player.x += player.turnSpeed + player.speed * 0.25;
  }

  if (player.x < 230) player.x = 230;
  if (player.x > 670) player.x = 670;

  for (const line of roadLines) {
    line.y += player.speed + 5;

    if (line.y > canvas.height) {
      line.y = -40;
    }
  }

  spawnTimer++;

  if (spawnTimer > 40) {
    spawnEnemy();
    spawnTimer = 0;
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const enemy = enemies[i];
    enemy.y += enemy.speed + player.speed * 0.4;

    if (enemy.y > canvas.height + 120) {
      enemies.splice(i, 1);
      score += 10;
    }

    if (
      player.x < enemy.x + enemy.width &&
      player.x + player.width > enemy.x &&
      player.y < enemy.y + enemy.height &&
      player.y + player.height > enemy.y
    ) {
      gameOver();
    }
  }

  ui.textContent = `Speed: ${Math.floor(player.speed * 10)}   Score: ${score}`;
}

function drawRoad() {
  ctx.fillStyle = '#4a4a4a';
  ctx.fillRect(220, 0, 460, canvas.height);

  for (let y = 0; y < canvas.height; y += 32) {
    ctx.fillStyle = y % 64 === 0 ? '#555' : '#666';
    ctx.fillRect(220, y, 460, 32);
  }

  ctx.fillStyle = '#d9b300';
  ctx.fillRect(220, 0, 8, canvas.height);
  ctx.fillRect(672, 0, 8, canvas.height);

  for (const line of roadLines) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(line.x, line.y, line.width, line.height);
  }

  for (let y = 0; y < canvas.height; y += 64) {
    ctx.fillStyle = '#2d8f2d';
    ctx.fillRect(0, y, 220, 32);
    ctx.fillRect(680, y, 220, 32);

    ctx.fillStyle = '#37aa37';
    ctx.fillRect(0, y + 32, 220, 32);
    ctx.fillRect(680, y + 32, 220, 32);
  }
}

function drawCar(car) {
  ctx.fillStyle = car.color;
  ctx.fillRect(car.x, car.y, car.width, car.height);

  ctx.fillStyle = '#222';
  ctx.fillRect(car.x + 4, car.y + 8, 14, 22);
  ctx.fillRect(car.x + 32, car.y + 8, 14, 22);
  ctx.fillRect(car.x + 4, car.y + 60, 14, 22);
  ctx.fillRect(car.x + 32, car.y + 60, 14, 22);

  ctx.fillStyle = '#87CEEB';
  ctx.fillRect(car.x + 8, car.y + 18, 34, 18);

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(car.x + 6, car.y + 4, 38, 6);

  ctx.fillStyle = '#ff3333';
  ctx.fillRect(car.x + 8, car.y + 78, 10, 6);
  ctx.fillRect(car.x + 32, car.y + 78, 10, 6);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawRoad();

  for (const enemy of enemies) {
    drawCar(enemy);
  }

  drawCar(player);
}

function gameLoop() {
  if (!gameRunning) return;

  update();
  draw();

  requestAnimationFrame(gameLoop);
}

function gameOver() {
  gameRunning = false;
  menu.style.display = 'flex';
  menu.innerHTML = `
    <h1>CRASH!</h1>
    <p>Your Score: ${score}</p>
    <button onclick="resetMenu()">Play Again</button>
  `;
}

function resetMenu() {
  menu.innerHTML = `
    <h1>RETRO RACER</h1>
    <p>Arrow Keys / WASD to drive</p>
    <button onclick="startGame()">Start Race</button>
  `;
  startGame();
}
</script>

</body>
</html>
